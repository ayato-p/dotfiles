---
# KDE Plasma (Wayland) 最小構成セットアップ
#
# 想定: ansible-pull での実行
#   sudo ansible-pull -U <このリポジトリのURL> local.yml
#
# 作成時点(2026年)では Ubuntu 26.04 LTS を想定しているが、
# 将来別バージョンに対しても実行されることを見込み、
# バージョン不一致はエラーにせず警告のみに留めている。
# 数年後に実行する場合は、まずこのファイル自体が古くなっていないか
# (パッケージ名の変更、KDE/Plasmaの仕様変更など)を一読してから流すこと。
# エラーが出たタスクがあれば、そのタスクだけコメントアウトして他を進め、
# 該当箇所だけ手動で最新のやり方を調べる方が早いことが多い。
#
# 全体方針:
# - hosts: localhost / connection: local で完結させている。
#   個人の開発マシン1台のみが対象であり、複数台のinventory管理は不要と判断。
# - 各タスクの設計判断(なぜそのパッケージ/設定を選んだか)は、
#   このファイル内の該当タスクの直前にコメントとして残している。
#   READMEにも概要はあるが、詳しい理由はこちらが一次情報。
#
# 実行後:
# 再起動してSDDMのログイン画面からPlasma(Wayland)セッションを選択する。
# fcitx5の設定(入力切替キー等)は fcitx5-config-qt から個別に行う。

- name: KDE Plasma (Wayland) 最小構成セットアップ
  hosts: localhost
  connection: local
  become: true

  vars:
    expected_release: "26.04"
    # システムのUI言語は英語固定(ディレクトリ名やメッセージを英語にするため)。
    # 日本語入力(fcitx5+mozc)はこのロケール設定とは独立して機能する。
    system_locale: "en_US.UTF-8"
    extra_locale: "ja_JP.UTF-8"
    # sudo経由のansible-pull実行を想定し、実行ユーザーを自動判定。
    # 想定と違う場合は実行時に -e target_user=xxxx で上書き可能。
    target_user: "{{ lookup('env', 'SUDO_USER') | default(ansible_user_id, true) }}"
    target_home: "/home/{{ target_user }}"
    default_font: "IBM Plex Sans JP,10,-1,5,50,0,0,0,0,0"
    default_fixed_font: "IBM Plex Mono,10,-1,5,50,0,0,0,0,0"
    default_small_font: "IBM Plex Sans JP,8,-1,5,50,0,0,0,0,0"
    plex_sans_jp_install_dir: "/usr/share/fonts/ibm-plex-sans-jp"
    kde_packages:
      - kde-plasma-desktop
    fcitx_packages:
      - fcitx5
      - fcitx5-mozc
      - fcitx5-config-qt
      - fonts-noto-cjk

  tasks:
    - name: Ubuntuバージョンを確認
      ansible.builtin.command: lsb_release -rs
      register: ubuntu_release
      changed_when: false

    - name: 想定外バージョンの場合は警告を表示
      ansible.builtin.debug:
        msg: >-
          想定バージョン({{ expected_release }})と異なります
          (検出: {{ ubuntu_release.stdout }})。
          このPlaybookが書かれた時点から時間が経っている場合、
          パッケージ名やKDEの仕様が変わっている可能性があるので、
          エラーが出た箇所は個別に最新情報を確認すること。
      when: ubuntu_release.stdout != expected_release

    - name: apt キャッシュを更新
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: システムをアップグレード
      ansible.builtin.apt:
        upgrade: safe

    - name: NetworkManagerを導入(最小構成インストールでnetplanのみの場合に備える)
      ansible.builtin.apt:
        name: network-manager
        state: present

    - name: NetworkManagerサービスを有効化
      ansible.builtin.systemd:
        name: NetworkManager
        enabled: true
        state: started

    - name: KDE Plasma(最小構成)を導入
      # kde-full ではなく kde-plasma-desktop を選択。
      # kde-full は教育ツール等を含み肥大化するため、最小構成を優先している。
      ansible.builtin.apt:
        name: "{{ kde_packages }}"
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: ターミナル関連ツール(Alacritty, tmux)を導入
      # 設定ファイル(alacritty.toml, .tmux.conf等)はこのリポジトリでは管理しない。
      # 既存のdotfiles管理から別途適用すること。
      ansible.builtin.apt:
        name:
          - alacritty
          - tmux
        state: present

    - name: SDDMを導入
      ansible.builtin.apt:
        name: sddm
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: SDDMをデフォルトディスプレイマネージャに設定
      ansible.builtin.debconf:
        name: sddm
        question: shared/default-x-display-manager
        value: sddm
        vtype: select
      notify: dpkg-reconfigure sddm

    - name: SDDMでPlasma(Wayland)セッションをデフォルトに設定
      # WaylandはKDE6系のデフォルト。GPUはIntel/AMD内蔵のみで特殊なドライバ事情が
      # ないため、素直にデフォルトに乗る判断をしている(NVIDIA環境ならX11も検討)。
      # [Autologin]はUser未指定のため自動ログイン自体は無効。セッションのデフォルトを
      # Waylandにする目的のみで使っている。
      ansible.builtin.copy:
        dest: /etc/sddm.conf.d/10-wayland.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Autologin]
          Session=plasmawayland

          [General]
          DisplayServer=wayland

    - name: グラフィカルターゲットをデフォルトに設定
      ansible.builtin.command: systemctl set-default graphical.target
      changed_when: false

    - name: 日本語(入力用)・英語(UI用)ロケールを生成
      # システム全体は en_US.UTF-8 に固定する方針。ja_JP.UTF-8 は入力用に
      # 生成だけしておく(システムのデフォルトLANGには採用しない)。
      ansible.builtin.command: "locale-gen {{ item }}"
      changed_when: false
      loop:
        - "{{ system_locale }}"
        - "{{ extra_locale }}"

    - name: システムのデフォルトロケールを英語に設定(ディレクトリ名やUIを英語にするため)
      # LANGをen_US.UTF-8にしておくと、xdg-user-dirs-updateが作るホーム直下の
      # ディレクトリ名(Downloads, Documents等)も英語になる。
      # 日本語入力(fcitx5+mozc)はロケール設定と独立した機能なので、
      # 英語UIのままで問題なく日本語入力できる。
      ansible.builtin.command: "update-locale LANG={{ system_locale }}"
      changed_when: false

    - name: 日本語入力環境(fcitx5+mozc)を導入
      ansible.builtin.apt:
        name: "{{ fcitx_packages }}"
        state: present

    - name: fcitx5用の環境変数を設定
      ansible.builtin.copy:
        dest: /etc/environment.d/90-fcitx5.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          GTK_IM_MODULE=fcitx
          QT_IM_MODULE=fcitx
          XMODIFIERS=@im=fcitx
          SDL_IM_MODULE=fcitx

    - name: 絵文字フォント(Noto Color Emoji)を導入
      # CBDT/CBLC形式でLinux上で広くカラー表示される。Ubuntu公式パッケージの
      # fontconfigルールにより絵文字レンジは自動でこのフォントへフォールバック
      # するため、追加のfontconfig設定は不要。
      ansible.builtin.apt:
        name: fonts-noto-color-emoji
        state: present

    - name: IBM Plexフォントを導入
      # 通常のIBM Plex SansはCJKグリフを持たないため、日本語部分がNoto Sans CJK等に
      # フォールバックしてデザインの一貫性が崩れる。そのため日本語対応版の
      # IBM Plex Sans JP(下記タスクで別途取得)をメインフォントに採用している。
      # ここで導入する fonts-ibm-plex はラテン文字用の補助。
      ansible.builtin.apt:
        name: fonts-ibm-plex
        state: present

    - name: zip展開用にunzipを導入
      ansible.builtin.apt:
        name: unzip
        state: present

    - name: IBM Plex Sans JPのリリース一覧を取得
      # GitHubのリリースタグがバージョン番号を含む形式(@ibm/plex-sans-jp@x.y.z)で、
      # 数年単位で更新され続けるため、固定URLではなくAPIで最新版を動的に取得する。
      ansible.builtin.uri:
        url: "https://api.github.com/repos/IBM/plex/releases"
        return_content: true
      register: plex_releases

    - name: IBM Plex Sans JPの最新リリースを特定
      ansible.builtin.set_fact:
        plex_sans_jp_release: >-
          {{ plex_releases.json
             | selectattr('tag_name', 'match', '^@ibm/plex-sans-jp@')
             | list | first }}

    - name: IBM Plex Sans JPのダウンロードURLを特定
      ansible.builtin.set_fact:
        plex_sans_jp_asset_url: >-
          {{ (plex_sans_jp_release.assets
              | selectattr('name', 'search', 'OpenType')
              | map(attribute='browser_download_url') | list
              | first)
             | default((plex_sans_jp_release.assets
                         | map(attribute='browser_download_url') | list | first), true) }}

    - name: IBM Plex Sans JPをダウンロード
      ansible.builtin.get_url:
        url: "{{ plex_sans_jp_asset_url }}"
        dest: /tmp/ibm-plex-sans-jp.zip
        mode: "0644"

    - name: IBM Plex Sans JPの展開先ディレクトリを作成
      ansible.builtin.file:
        path: "{{ plex_sans_jp_install_dir }}"
        state: directory
        mode: "0755"

    - name: IBM Plex Sans JPを展開
      ansible.builtin.unarchive:
        src: /tmp/ibm-plex-sans-jp.zip
        dest: "{{ plex_sans_jp_install_dir }}"
        remote_src: true

    - name: フォントキャッシュを更新
      ansible.builtin.command: fc-cache -f
      changed_when: false

    - name: 対象ユーザーの~/.configディレクトリを確認
      # フォント設定はユーザー単位(~/.config/kdeglobals)のため、
      # target_user(上のvarsでSUDO_USERから自動判定)のホームに書き込む。
      ansible.builtin.file:
        path: "{{ target_home }}/.config"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    - name: KDEのデフォルトフォントをIBM Plex Sansに設定
      # kwriteconfig6はPlasma 6系のコマンド名。将来Plasmaのメジャーバージョンが
      # 上がっていて command not found になったら、その時点のバージョンに
      # 応じたコマンド名(kwriteconfig5等)に読み替えること。
      ansible.builtin.command:
        cmd: >-
          kwriteconfig6 --file kdeglobals --group General
          --key font "{{ default_font }}"
      become_user: "{{ target_user }}"
      environment:
        HOME: "{{ target_home }}"
      changed_when: true

    - name: KDEのメニューフォントをIBM Plex Sansに設定
      ansible.builtin.command:
        cmd: >-
          kwriteconfig6 --file kdeglobals --group General
          --key menuFont "{{ default_font }}"
      become_user: "{{ target_user }}"
      environment:
        HOME: "{{ target_home }}"
      changed_when: true

    - name: KDEのツールバーフォントをIBM Plex Sansに設定
      ansible.builtin.command:
        cmd: >-
          kwriteconfig6 --file kdeglobals --group General
          --key toolBarFont "{{ default_font }}"
      become_user: "{{ target_user }}"
      environment:
        HOME: "{{ target_home }}"
      changed_when: true

    - name: KDEの小さい文字用フォントをIBM Plex Sansに設定
      ansible.builtin.command:
        cmd: >-
          kwriteconfig6 --file kdeglobals --group General
          --key smallestReadableFont "{{ default_small_font }}"
      become_user: "{{ target_user }}"
      environment:
        HOME: "{{ target_home }}"
      changed_when: true

    - name: KDEの等幅フォントをIBM Plex Monoに設定
      ansible.builtin.command:
        cmd: >-
          kwriteconfig6 --file kdeglobals --group General
          --key fixed "{{ default_fixed_font }}"
      become_user: "{{ target_user }}"
      environment:
        HOME: "{{ target_home }}"
      changed_when: true

    - name: 完了メッセージ
      ansible.builtin.debug:
        msg: >-
          セットアップ完了。再起動するとSDDMからPlasma(Wayland)で
          ログインできるはず。再起動後、fcitx5の設定(入力切替キー等)は
          fcitx5-config-qt から個別に行うこと。
          デフォルトフォントはIBM Plex Sans JP/Monoに設定済み(対象ユーザー:
          {{ target_user }})。反映されない場合はログアウト・ログインし直すこと。
          絵文字はNoto Color Emojiにフォールバックする想定(ターミナル等で表示確認推奨)。
          追加アプリは最小構成のため未導入(意図的)。

  handlers:
    - name: dpkg-reconfigure sddm
      ansible.builtin.command: dpkg-reconfigure -f noninteractive sddm