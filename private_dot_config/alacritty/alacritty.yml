import:
  - ~/.config/alacritty/themes/themes/tokyo-night.yaml

env:
  TERM: alacritty

window:
  opacity: 0.85

font:
  size: 12
  normal:
    family: DejaVu Sans Mono for Powerline
    style: Regular
  bold:
    family: DejaVu Sans Mono
    style: Bold
  italic:
    family: DejaVu Sans Mono
    style: Italic
  bold_italic:
    family: DejaVu Sans Mono
    style: Bold Italic

key_bindings:
  - { key: Return, mods: Control|Shift, action: SpawnNewInstance }
